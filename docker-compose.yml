services:

  postgres:
    image: postgres:15-alpine
    container_name: safepay-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-safepay}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-safepay}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - safepay-net
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    container_name: safepay-redis
    restart: unless-stopped
    env_file:
      - .env
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - safepay-net
    mem_limit: 256m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safepay-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/safepay
      ALEMBIC_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/safepay
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8001}
      BLOCKCHAIN_RPC_URL: ${BLOCKCHAIN_RPC_URL:-http://hardhat-node:8545}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - safepay-net
    mem_limit: 1024m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safepay-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-SafePay}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', res => process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - safepay-net
    mem_limit: 1024m

  hardhat-node:
    build:
      context: ./blockchain
      dockerfile: Dockerfile
    container_name: safepay-hardhat-node
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BLOCKCHAIN_CHAIN_ID: ${BLOCKCHAIN_CHAIN_ID:-31337}
    ports:
      - "8545:8545"
    volumes:
      - ./blockchain:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://127.0.0.1:8545',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - safepay-net
    mem_limit: 512m

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: safepay-ml-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://0.0.0.0:8001}
      ML_MODEL_VERSION: ${ML_MODEL_VERSION:-local-dev}
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - safepay-net
    mem_limit: 512m

volumes:
  postgres_data:
    name: safepay_postgres_data
  redis_data:
    name: safepay_redis_data

networks:
  safepay-net:
    name: safepay-net
    driver: bridge
